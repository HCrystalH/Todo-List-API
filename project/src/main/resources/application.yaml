server:
  port: 8080
spring:
  application:
    name: project

  #PostgreSQL connection
  datasource:
    url : jdbc:postgresql://localhost:5432/todo_api_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  #Hibernate properties
  jpa:
    hibernate:
      ddl-auto : update # create
    show-sql: true
    properties:
      hibernate:
        format_sql : true
